# Конфигурация auto-cpufreq для Lenovo Legion 7
# Intel i9 + RTX 4070 Mobile

# Настройки при подключении к сети
[charger]
# Используем powersave - он лучше работает с Intel P-State
# и динамически поднимает частоты когда нужно
governor = powersave

# Минимальная частота (800 MHz = 0.8 GHz)
scaling_min_freq = 800000

# Максимальная частота (5.4 GHz для i9)
scaling_max_freq = 5400000

# Turbo Boost - auto позволяет использовать когда нужно
turbo = auto

# Ограничение энергопотребления (опционально)
# energy_performance_preference = balance_performance

# Настройки при работе от батареи
[battery]
# Powersave для экономии энергии
governor = powersave

# Минимальная частота
scaling_min_freq = 800000

# Ограничиваем максимальную частоту для экономии батареи
# 3.0 GHz достаточно для большинства задач
scaling_max_freq = 3000000

# Turbo можно отключить на батарее для экономии
turbo = auto

# Порог зарядки батареи (для продления срока службы)
enable_thresholds = true
start_threshold = 20
stop_threshold = 80

# Энергоэффективность
# energy_performance_preference = power

# Опциональные настройки для конкретных процессов
# Раскомментируй если нужно
# [battery.process]
# firefox = performance
# chrome = performance

# [charger.process]
# compiling = performance
