    [paired_clients.settings]
    controllers_override = []
    h_scroll_acceleration = 1.0
    mouse_acceleration = 1.0
    run_gid = 1000
    run_uid = 1000
    v_scroll_acceleration = 1.0

[[profiles]]
id = 'moonlight-profile-id'

    [[profiles.apps]]
    icon_png_path = 'https://raw.githubusercontent.com/games-on-whales/wolf-ui/refs/heads/main/src/Icons/wolf_ui_icon.png'
    start_virtual_compositor = true
    title = 'Wolf UI'

        [profiles.apps.runner]
        base_create_json = '''{
      "HostConfig": {
        "IpcMode": "host",
        "CapAdd": ["NET_RAW", "MKNOD", "NET_ADMIN", "SYS_ADMIN", "SYS_NICE"],
        "Privileged": false,
        "DeviceCgroupRules": ["c 13:* rmw", "c 244:* rmw"]
      }
    }'''
        devices = []
        env = [
            'GOW_REQUIRED_DEVICES=/dev/input/event* /dev/dri/* /dev/nvidia*',
            'WOLF_SOCKET_PATH=/var/run/wolf/wolf.sock',
            'WOLF_UI_AUTOUPDATE=False',
            'LOGLEVEL=INFO'
        ]
        image = 'ghcr.io/games-on-whales/wolf-ui:main'
        mounts = [ '/var/run/wolf/wolf.sock:/var/run/wolf/wolf.sock' ]
        name = 'Wolf-UI'
        ports = []
        type = 'docker'

    [[profiles.apps]]
    icon_png_path = 'https://raw.githubusercontent.com/games-on-whales/wolf/refs/heads/stable/docs/images/test_ball_icon.png'
    start_audio_server = false
    start_virtual_compositor = false
    title = 'Test ball'

        [profiles.apps.audio]
        source = 'audiotestsrc wave=ticks is-live=true'

        [profiles.apps.runner]
        run_cmd = "sh -c \"while :; do echo 'running...'; sleep 10; done\""
        type = 'process'

        [profiles.apps.video]
        source = '''videotestsrc pattern=ball flip=true is-live=true !
video/x-raw, framerate={fps}/1
'''

    [[profiles.apps]]
    icon_png_path = 'https://games-on-whales.github.io/wildlife/apps/xfce/assets/icon.png'
    title = 'Desktop (xfce)'

        [profiles.apps.runner]
        base_create_json = '''{
  "HostConfig": {
    "IpcMode": "host",
    "Privileged": false,
    "CapAdd": ["SYS_ADMIN", "SYS_NICE", "SYS_PTRACE", "NET_RAW", "MKNOD", "NET_ADMIN"],
    "SecurityOpt": ["seccomp=unconfined", "apparmor=unconfined"],
    "DeviceCgroupRules": ["c 13:* rmw", "c 244:* rmw"]
  }
}
'''
        devices = []
        env = [
            'GOW_REQUIRED_DEVICES=/dev/input/* /dev/dri/* /dev/nvidia*',
            'MANGOHUD=0',
            'DISABLE_MANGOAPP=1',
            'PROTON_LOG=1'
        ]
        image = 'wolf-xfce-steam-native:local'
        mounts = [
            '/home/rey/wolf/xfce-init/20-set-retro-password.sh:/etc/cont-init.d/20-set-retro-password.sh:ro',
            '/home/rey/wolf/xfce-init/25-setup-nvidia-vulkan.sh:/etc/cont-init.d/25-setup-nvidia-vulkan.sh:ro',
            '/home/rey/wolf/xfce-init/30-setup-nvidia-compat32.sh:/etc/cont-init.d/30-setup-nvidia-compat32.sh:ro',
            '/home/rey/wolf/nvidia-compat32:/opt/nvidia-compat32:ro',
            '/home/rey/wolf/xfce-home/config:/home/retro/.config:rw',
            '/home/rey/wolf/xfce-home/local:/home/retro/.local:rw',
            '/home/rey/wolf/xfce-home/cache:/home/retro/.cache:rw',
            '/home/rey/wolf/xfce-home/desktop:/home/retro/Desktop:rw',
            '/home/rey/wolf/xfce-home/downloads:/home/retro/Downloads:rw',
            '/home/rey/wolf/xfce-home/documents:/home/retro/Documents:rw',
            '/home/rey/wolf/xfce-games:/games:rw'
        ]
        name = 'WolfXFCE'
        ports = []
        type = 'docker'

