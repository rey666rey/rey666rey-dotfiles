[meta]
name = "Matugen"
description = "Material You theme generated by Matugen - dark variant"
variant = "dark"

# ============================================================================
# Core Colors
# ============================================================================

[colors.core]
accent = "#c0c1ff"
accent_foreground = "#282a60"
background = "#1f1f25"
foreground = "#e4e1e9"
secondary_background = "#1f1f25"
border = "#46464f"

# ============================================================================
# Window Borders
# ============================================================================

[colors.main_window]
border = "#46464f"

[colors.settings_window]
border = "#918f9a"

# ============================================================================
# Accent Palette
# ============================================================================

[colors.accents]
blue = "#c0c1ff"
green = "#e8b9d4"
magenta = "#c5c4dd"
orange = { name = "#ffb4ab", lighter = 40 }
red = "#ffb4ab"
yellow = { name = "#e8b9d4", lighter = 80 }
cyan = { name = "#c0c1ff", lighter = 50 }
purple = "#c5c4dd"

# ============================================================================
# Text System
# ============================================================================

[colors.text]
default = "#e4e1e9"
muted = "#c7c5d0"
danger = "#ffb4ab"
success = "#e8b9d4"
placeholder = { name = "#c7c5d0", opacity = 0.6 }

[colors.text.selection]
background = "#c0c1ff"
foreground = "#282a60"

[colors.text.links]
default = "#c0c1ff"
visited = { name = "#e8b9d4", darker = 20 }

# ============================================================================
# Input Fields
# ============================================================================

[colors.input]
border = "#918f9a"
border_focus = "#c0c1ff"
border_error = "#ffb4ab"

# ============================================================================
# Buttons
# ============================================================================

[colors.button.primary]
background = "#2a292f"
foreground = "#e4e1e9"

[colors.button.primary.hover]
background = "#35343a"  

[colors.button.primary.focus]
outline = "#c0c1ff"

# ============================================================================
# Lists
# ============================================================================

[colors.list.item.hover]
background = { name = "#3f4178", opacity = 0.25 }  
foreground = "#e4e1e9"

[colors.list.item.selection]
background = { name = "#3f4178", opacity = 0.50 }
foreground = "#e1e0ff"
secondary_background = "#3f4178"
secondary_foreground = "#e1e0ff"

# ============================================================================
# Grid Items
# ============================================================================

[colors.grid.item]
background = "#1f1f25"

[colors.grid.item.hover]
outline = { name = "#c5c4dd", opacity = 0.8 }

[colors.grid.item.selection]
outline = { name = "#c0c1ff" }

# ============================================================================
# Scrollbars
# ============================================================================

[colors.scrollbars]
background = { name = "#c0c1ff", opacity = 0.2 }

# ============================================================================
# Loading States
# ============================================================================

[colors.loading]
bar = "#c0c1ff"
spinner = "#c0c1ff"
