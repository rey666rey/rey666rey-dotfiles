################
### MONITORS ###
################

# https://wiki.hyprland.org/Configuring/Monitors/
### Текущий профиль: ноутбук слева, внешний монитор справа
# eDP-1: встроенный экран слева, максимальная герцовка + scale 1.67.
# DP-1: внешний экран справа, принудительно 2560x1440@180 по DisplayPort.
# Простая формула даёт 1533, но Hyprland округляет effective width
# встроенного экрана чуть шире. Ставим безопасный X-offset без overlap.
monitor = eDP-1,preferred,0x0,1.67
monitor = DP-1,2560x1440@180,1536x0,1

### Привязка рабочих столов к мониторам
workspace = 1, monitor:eDP-1, default:true
workspace = 2, monitor:DP-1, default:true
