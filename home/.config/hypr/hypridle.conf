general {
    lock_cmd = ~/.config/bin/idle-inhibitor.sh --lock-unless-enabled
    before_sleep_cmd = ~/.config/bin/idle-inhibitor.sh --lock-unless-enabled
    # Avoid touching DPMS on resume. On NVIDIA laptops this can race with
    # the compositor/display pipeline while the internal eDP panel wakes up.
    after_sleep_cmd = /usr/bin/true
}

listener {
    timeout = 600
    on-timeout = brightnessctl -s set 20%
    on-resume = brightnessctl -r
}

listener {
    timeout = 780
    on-timeout = notify-send -t 3000 "Hypridle" "You are idle!"
    on-resume = brightnessctl -r
}

listener {
    timeout = 900
    on-timeout = brightnessctl -r; ~/.config/bin/idle-inhibitor.sh --lock-unless-enabled
}

listener {
    timeout = 960
    on-timeout = systemctl suspend
}
